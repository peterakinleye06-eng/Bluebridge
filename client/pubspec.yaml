name: bridgelink_logistics_app
description: A logistics app for customers and owners with a responsive Flutter dashboard.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^1.6.0
  flutter_svg: ^2.0.0
  provider: ^6.0.0
  go_router: ^8.0.0
  google_sign_in: ^6.2.1
  flutter_paystack_plus: 2.5.0
  image_picker: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.11.0
  flutter_lints: ^2.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"